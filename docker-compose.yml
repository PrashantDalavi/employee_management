services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://pdalavi:password@host.docker.internal:5432/employee_management_development
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - node_modules:/rails/node_modules
    stdin_open: true
    tty: true

volumes:
  bundle_cache:
  node_modules:
